<style>
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0px 20px 50px rgba(26, 26, 26, 0.08);
        }
        .spinner {
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pulse-ring {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>

<body class="bg-background text-on-background font-body-md min-h-screen relative overflow-hidden">
<!-- Dimmed Background (Simulating Checkout Page) -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center opacity-30 blur-sm" data-alt="A luxurious modern apartment interior in Lagos, featuring minimalist design, neutral tones, and expansive windows offering a coastal view. The scene is slightly blurred to serve as a background. High key lighting, elegant atmosphere." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBGGtKDNh0wxZusTnIdDkSrSprPDTw5E-3_oqwLJJlPiibOdb-WDQBux1LmgwtDePpCQmpxb-CRMoEEepR2hcuMidFISX-VJFDYYgbp0e8eMFO4JBAd8PqRQyUfISRDUggv2MROLwif-fgwnJQsZRXuWIcOE0SsWXBnG2zAlY7TMKlA66J3pFajhrb-cQN3fZoEz_dJ5I5bNI4PgYBefzvHsKGEEtAzvTsnSDyJWhEj1Pvnt7wdZ0-7MOVtJDRz3DtcOrvSAYIP8omS')"></div>
<div class="absolute inset-0 bg-surface/80 backdrop-blur-md"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-gutter">
<!-- Premium Payment Modal -->
<div class="glass-card rounded-xl w-full max-w-md p-stack-md flex flex-col items-center text-center">
<!-- Secure Badge -->
<div class="mb-stack-sm flex items-center justify-center gap-2 text-primary">
<span class="material-symbols-outlined" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="font-label-caps text-label-caps text-primary tracking-widest">SECURE CHECKOUT</span>
</div>
<!-- Processing Animation -->
<div class="relative w-24 h-24 my-stack-sm flex items-center justify-center">
<div class="absolute inset-0 rounded-full border-4 border-surface-variant"></div>
<div class="absolute inset-0 rounded-full border-4 border-primary border-t-transparent spinner"></div>
<span class="material-symbols-outlined text-primary text-3xl pulse-ring" data-icon="payments" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Processing Payment</h1>
<p class="font-body-md text-body-md text-secondary mb-stack-md">Please do not close this window or refresh the page. We are securely communicating with your bank.</p>
<!-- Transaction Details Summary -->
<div class="w-full bg-surface-container-low rounded-lg p-4 mb-stack-md border border-outline/10 text-left">
<div class="flex justify-between items-center mb-2">
<span class="font-body-md text-body-md text-secondary">Amount</span>
<span class="font-body-lg text-body-lg text-on-surface font-semibold">₦1,250,000</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body-md text-body-md text-secondary">Reference</span>
<span class="font-body-md text-body-md text-on-surface">LL-2409-A7X9</span>
</div>
</div>
<!-- Trusted By Logos (Simulated) -->
<div class="w-full pt-4 border-t border-outline/10 flex justify-center items-center gap-6 opacity-60">
<span class="material-symbols-outlined text-2xl" data-icon="verified_user">verified_user</span>
<span class="material-symbols-outlined text-2xl" data-icon="shield">shield</span>
<span class="material-symbols-outlined text-2xl" data-icon="security">security</span>
</div>
</div>
</main>
<script>
        // Micro-interaction: Simulate payment success after 4 seconds for demonstration purposes
        // In a real application, this would be handled by the payment gateway callback
        setTimeout(() => {
            const modal = document.querySelector('.glass-card');
            if(modal) {
                modal.innerHTML = `
                    <div class="flex flex-col items-center text-center p-stack-md">
                        <div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mb-stack-sm scale-0 transition-transform duration-500" id="success-icon">
                            <span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
                        </div>
                        <h1 class="font-headline-md text-headline-md text-on-surface mb-2">Payment Successful</h1>
                        <p class="font-body-md text-body-md text-secondary mb-stack-md">Your booking at LUXE LAGOS is confirmed. A receipt has been sent to your email.</p>
                        <button class="bg-primary-container text-on-primary-container font-label-caps text-label-caps px-8 py-4 rounded-full w-full hover:bg-primary transition-colors">VIEW RESERVATION</button>
                    </div>
                `;
                
                // Trigger animation
                requestAnimationFrame(() => {
                    const icon = document.getElementById('success-icon');
                    if(icon) {
                        icon.style.transform = 'scale(1)';
                    }
                });
            }
        }, 4000);
    </script>
